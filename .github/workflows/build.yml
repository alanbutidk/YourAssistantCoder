name: Build YAC

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  transpile:
    name: Transpile to C
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install nuitka ordered-set zstandard
      - name: Transpile
        run: |
          cd src
          python -m nuitka --generate-c-only --standalone \
            --include-module=agent \
            --include-module=ams \
            --include-module=pfps \
            --include-module=permissions \
            --include-module=notify \
            --include-module=console \
            --include-module=error_execution \
            --include-module=model_router \
            --nofollow-import-to=anthropic \
            --nofollow-import-to=openai \
            --nofollow-import-to=google \
            --nofollow-import-to=keyring \
            --nofollow-import-to=rich \
            --nofollow-import-to=watchdog \
            --nofollow-import-to=pwinput \
            --nofollow-import-to=colorama \
            --nofollow-import-to=httpx \
            --nofollow-import-to=pydantic \
            --nofollow-import-to=tenacity \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=grpc \
            --nofollow-import-to=torch \
            --nofollow-import-to=numpy \
            --nofollow-import-to=pandas \
            --nofollow-import-to=matplotlib \
            --nofollow-import-to=PyQt5 \
            --nofollow-import-to=PyQt6 \
            --nofollow-import-to=django \
            --nofollow-import-to=flask \
            --nofollow-import-to=pytest \
            --nofollow-import-to=setuptools \
            --nofollow-import-to=distutils \
            --nofollow-import-to=unittest \
            --nofollow-import-to=idlelib \
            --nofollow-import-to=turtle \
            yac.py
      - name: Copy SConstruct into build dir
        run: cp SConstruct src/yac.build/yac.onefile-build/SConstruct 2>/dev/null || cp SConstruct src/yac.build/SConstruct
      - name: Zip C files + headers + SConstruct
        run: zip -r yac-c-src.zip src/yac.build/
      - uses: actions/upload-artifact@v4
        with:
          name: yac-c-src
          path: yac-c-src.zip
          retention-days: 90
