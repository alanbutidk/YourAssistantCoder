name: Build YAC

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0)"
        required: false
        default: "dev"

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-win-${{ hashFiles('src/**') }}
          restore-keys: nuitka-win-
      - run: pip install -r requirements.txt nuitka zstandard ordered-set pwinput winotify
      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.13.0/zig-windows-x86_64-0.13.0.zip -o zig.zip
          Expand-Archive zig.zip -DestinationPath C:\zig
          echo "C:\zig\zig-windows-x86_64-0.13.0" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build
        run: cd src && python -m nuitka --standalone --onefile --windows-console-mode=attach --output-filename=yac.exe --output-dir=../dist --assume-yes-for-downloads --jobs=4 --lto=no --clang --nofollow-import-to=tkinter --nofollow-import-to=matplotlib --nofollow-import-to=numpy --nofollow-import-to=pandas --nofollow-import-to=scipy --nofollow-import-to=PIL --nofollow-import-to=torch --nofollow-import-to=tensorflow --nofollow-import-to=sklearn --nofollow-import-to=PyQt5 --nofollow-import-to=PyQt6 --nofollow-import-to=PySide2 --nofollow-import-to=PySide6 --nofollow-import-to=IPython --nofollow-import-to=pytest --nofollow-import-to=sphinx --nofollow-import-to=django --nofollow-import-to=flask --nofollow-import-to=fastapi --nofollow-import-to=sqlalchemy --nofollow-import-to=boto3 --nofollow-import-to=botocore --nofollow-import-to=azure --nofollow-import-to=gi --nofollow-import-to=wx --nofollow-import-to=setuptools --nofollow-import-to=distutils --nofollow-import-to=unittest --nofollow-import-to=test --nofollow-import-to=idlelib --nofollow-import-to=lib2to3 --nofollow-import-to=ensurepip --nofollow-import-to=venv --nofollow-import-to=turtle --nofollow-import-to=curses --nofollow-import-to=xmlrpc yac.py
      - uses: actions/upload-artifact@v4
        with:
          name: yac-windows-${{ github.event.inputs.version }}
          path: dist/yac.exe
          retention-days: 30

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/nuitka
          key: nuitka-linux-${{ hashFiles('src/**') }}
          restore-keys: nuitka-linux-
      - run: sudo apt-get update -qq && sudo apt-get install -y patchelf ccache libsecret-1-dev
      - run: pip install -r requirements.txt nuitka zstandard ordered-set pwinput
      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ -C /usr/local/bin --strip-components=1 zig-linux-x86_64-0.13.0/zig
      - name: Build
        run: cd src && python -m nuitka --standalone --onefile --output-filename=yac --output-dir=../dist --assume-yes-for-downloads --jobs=4 --lto=no --clang --nofollow-import-to=tkinter --nofollow-import-to=matplotlib --nofollow-import-to=numpy --nofollow-import-to=pandas --nofollow-import-to=scipy --nofollow-import-to=PIL --nofollow-import-to=torch --nofollow-import-to=tensorflow --nofollow-import-to=sklearn --nofollow-import-to=PyQt5 --nofollow-import-to=PyQt6 --nofollow-import-to=PySide2 --nofollow-import-to=PySide6 --nofollow-import-to=IPython --nofollow-import-to=pytest --nofollow-import-to=sphinx --nofollow-import-to=django --nofollow-import-to=flask --nofollow-import-to=fastapi --nofollow-import-to=sqlalchemy --nofollow-import-to=boto3 --nofollow-import-to=botocore --nofollow-import-to=azure --nofollow-import-to=gi --nofollow-import-to=wx --nofollow-import-to=setuptools --nofollow-import-to=distutils --nofollow-import-to=unittest --nofollow-import-to=test --nofollow-import-to=idlelib --nofollow-import-to=lib2to3 --nofollow-import-to=ensurepip --nofollow-import-to=venv --nofollow-import-to=turtle --nofollow-import-to=curses --nofollow-import-to=xmlrpc yac.py
      - uses: actions/upload-artifact@v4
        with:
          name: yac-linux-${{ github.event.inputs.version }}
          path: dist/yac
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event.inputs.version != 'dev'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: yac-windows-${{ github.event.inputs.version }}
          path: dist/windows
      - uses: actions/download-artifact@v4
        with:
          name: yac-linux-${{ github.event.inputs.version }}
          path: dist/linux
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: YourAssistantCoder v${{ github.event.inputs.version }}
          files: |
            dist/windows/yac.exe
            dist/linux/yac
