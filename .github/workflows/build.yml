name: Build YAC

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0)"
        required: false
        default: "dev"

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-win-
      - run: pip install -r requirements.txt pyinstaller
      - name: Build
        run: cd src && pyinstaller --onefile --console --name yac --distpath ../dist --noconfirm yac.py
      - uses: actions/upload-artifact@v4
        with:
          name: yac-windows
          path: dist/yac.exe
          retention-days: 30

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-linux-
      - run: sudo apt-get update -qq && sudo apt-get install -y libsecret-1-dev
      - run: pip install -r requirements.txt pyinstaller
      - name: Build
        run: cd src && pyinstaller --onefile --console --name yac --distpath ../dist --noconfirm yac.py
      - uses: actions/upload-artifact@v4
        with:
          name: yac-linux
          path: dist/yac
          retention-days: 30

  release:
    name: Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event.inputs.version != 'dev' && github.event.inputs.version != ''
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: yac-windows
          path: dist/windows
      - uses: actions/download-artifact@v4
        with:
          name: yac-linux
          path: dist/linux
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: YourAssistantCoder v${{ github.event.inputs.version }}
          files: |
            dist/windows/yac.exe
            dist/linux/yac
