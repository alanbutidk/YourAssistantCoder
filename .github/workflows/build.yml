name: Build YAC

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0)"
        required: false
        default: "dev"

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-${{ hashFiles('src/**') }}
          restore-keys: nuitka-windows-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-windows-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-windows-

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard ordered-set pwinput winotify

      - name: Build with Nuitka
        run: cd src && python -m nuitka --standalone --onefile --windows-console-mode=attach --output-filename=yac.exe --output-dir=../dist --assume-yes-for-downloads --jobs=4 --nofollow-imports --follow-import-to=anthropic --follow-import-to=openai --follow-import-to=google.genai --follow-import-to=keyring --follow-import-to=rich --follow-import-to=watchdog --follow-import-to=pwinput --follow-import-to=winotify --follow-import-to=colorama --follow-import-to=httpx --follow-import-to=httpcore --follow-import-to=anyio --follow-import-to=sniffio --follow-import-to=certifi --follow-import-to=pydantic --follow-import-to=pydantic_core --follow-import-to=typing_extensions --follow-import-to=tenacity --follow-import-to=tqdm --follow-import-to=zstandard --follow-import-to=ordered_set --follow-import-to=agent --follow-import-to=ams --follow-import-to=pfps --follow-import-to=permissions --follow-import-to=model_router --follow-import-to=error_execution --follow-import-to=notify --follow-import-to=console yac.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: yac-windows-${{ github.event.inputs.version }}
          path: dist/yac.exe
          retention-days: 30

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/.cache/nuitka
          key: nuitka-linux-${{ hashFiles('src/**') }}
          restore-keys: nuitka-linux-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-linux-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y patchelf ccache libsecret-1-dev

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard ordered-set pwinput

      - name: Build with Nuitka
        run: cd src && python -m nuitka --standalone --onefile --output-filename=yac --output-dir=../dist --assume-yes-for-downloads --jobs=4 --nofollow-imports --follow-import-to=anthropic --follow-import-to=openai --follow-import-to=google.genai --follow-import-to=keyring --follow-import-to=rich --follow-import-to=watchdog --follow-import-to=pwinput --follow-import-to=colorama --follow-import-to=httpx --follow-import-to=httpcore --follow-import-to=anyio --follow-import-to=sniffio --follow-import-to=certifi --follow-import-to=pydantic --follow-import-to=pydantic_core --follow-import-to=typing_extensions --follow-import-to=tenacity --follow-import-to=tqdm --follow-import-to=zstandard --follow-import-to=ordered_set --follow-import-to=agent --follow-import-to=ams --follow-import-to=pfps --follow-import-to=permissions --follow-import-to=model_router --follow-import-to=error_execution --follow-import-to=notify --follow-import-to=console yac.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: yac-linux-${{ github.event.inputs.version }}
          path: dist/yac
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event.inputs.version != 'dev'
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: yac-windows-${{ github.event.inputs.version }}
          path: dist/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: yac-linux-${{ github.event.inputs.version }}
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: YourAssistantCoder v${{ github.event.inputs.version }}
          body: |
            ## YourAssistantCoder v${{ github.event.inputs.version }}
            Sandboxed, tracked, multi-model AI coding agent.
            ### Downloads
            - `yac.exe` - Windows (no Python needed)
            - `yac` - Linux (no Python needed)
            ### Usage
            ```bash
            yac init myproject --path ./myproject --model gpt
            yac run "refactor auth.py" --model gpt
            ```
          files: |
            dist/windows/yac.exe
            dist/linux/yac
