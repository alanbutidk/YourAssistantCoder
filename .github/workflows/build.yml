name: Build YAC

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0)"
        required: false
        default: "dev"

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-win-${{ hashFiles('src/**') }}
          restore-keys: nuitka-win-
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-win-
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      - run: pip install -r requirements.txt nuitka zstandard ordered-set pwinput winotify
      - name: Build
        env:
          CC: zig cc
          CXX: zig c++
        run: cd src && python -m nuitka --standalone --onefile --windows-console-mode=attach --output-filename=yac.exe --output-dir=../dist --assume-yes-for-downloads --jobs=4 --lto=no --nofollow-import-to=grpc --nofollow-import-to=google.protobuf --nofollow-import-to=google.api_core --nofollow-import-to=google.auth --nofollow-import-to=google.cloud --nofollow-import-to=proto --nofollow-import-to=tkinter --nofollow-import-to=matplotlib --nofollow-import-to=numpy --nofollow-import-to=pandas --nofollow-import-to=torch --nofollow-import-to=tensorflow --nofollow-import-to=PyQt5 --nofollow-import-to=PyQt6 --nofollow-import-to=django --nofollow-import-to=flask --nofollow-import-to=pytest --nofollow-import-to=sphinx --nofollow-import-to=boto3 --nofollow-import-to=botocore --nofollow-import-to=setuptools --nofollow-import-to=distutils --nofollow-import-to=unittest --nofollow-import-to=idlelib --nofollow-import-to=turtle --nofollow-import-to=curses --nofollow-import-to=xmlrpc --nofollow-import-to=email --nofollow-import-to=html --nofollow-import-to=ftplib --nofollow-import-to=imaplib --nofollow-import-to=smtplib --nofollow-import-to=poplib --nofollow-import-to=telnetlib yac.py
      - uses: actions/upload-artifact@v4
        with:
          name: yac-windows
          path: dist/yac.exe
          retention-days: 30

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/nuitka
          key: nuitka-linux-${{ hashFiles('src/**') }}
          restore-keys: nuitka-linux-
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-linux-
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      - run: sudo apt-get update -qq && sudo apt-get install -y patchelf libsecret-1-dev
      - run: pip install -r requirements.txt nuitka zstandard ordered-set pwinput
      - name: Build
        env:
          CC: zig cc
          CXX: zig c++
        run: cd src && python -m nuitka --standalone --onefile --output-filename=yac --output-dir=../dist --assume-yes-for-downloads --jobs=4 --lto=no --nofollow-import-to=grpc --nofollow-import-to=google.protobuf --nofollow-import-to=google.api_core --nofollow-import-to=google.auth --nofollow-import-to=google.cloud --nofollow-import-to=proto --nofollow-import-to=tkinter --nofollow-import-to=matplotlib --nofollow-import-to=numpy --nofollow-import-to=pandas --nofollow-import-to=torch --nofollow-import-to=tensorflow --nofollow-import-to=PyQt5 --nofollow-import-to=PyQt6 --nofollow-import-to=django --nofollow-import-to=flask --nofollow-import-to=pytest --nofollow-import-to=sphinx --nofollow-import-to=boto3 --nofollow-import-to=botocore --nofollow-import-to=setuptools --nofollow-import-to=distutils --nofollow-import-to=unittest --nofollow-import-to=idlelib --nofollow-import-to=turtle --nofollow-import-to=curses --nofollow-import-to=xmlrpc --nofollow-import-to=email --nofollow-import-to=html --nofollow-import-to=ftplib --nofollow-import-to=imaplib --nofollow-import-to=smtplib --nofollow-import-to=poplib --nofollow-import-to=telnetlib yac.py
      - uses: actions/upload-artifact@v4
        with:
          name: yac-linux
          path: dist/yac
          retention-days: 30
